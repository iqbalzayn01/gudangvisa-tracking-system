<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/design/logo-square.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GudangVisa — Document tracking system for VISA, KITAS, and Passport processing. Track your immigration documents in real time."
    />
    <meta name="theme-color" content="#0f1117" />
    <title>GudangVisa — Document Tracking System</title>

    <!-- Preconnect to API for faster first request -->
    <link
      rel="preconnect"
      href="https://gudangvisa-backend-production.up.railway.app"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://gudangvisa-backend-production.up.railway.app"
    />

    <!-- Google Fonts — preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
