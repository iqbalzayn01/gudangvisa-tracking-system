<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lacak status dan riwayat dokumen imigrasi Anda secara real-time. Layanan pengurusan Visa, KITAS/KITAP, dan Paspor yang cepat, andal, dan transparan di Bali." />
    <meta name="theme-color" content="#0f1117" />
    <title>GudangVisa — Lacak Dokumen Imigrasi Anda (Visa, KITAS, Paspor)</title>

    <!-- Canonical points to the public landing; per-route JS keeps it in sync. -->
    <link rel="canonical" href="https://gudangvisa-tracking-system.vercel.app/portal" />

    <!-- Open Graph / Twitter — defaults for social scrapers (no JS). The public
         landing is the shareable page; private routes are noindex + disallowed. -->
    <meta property="og:site_name" content="GudangVisa" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GudangVisa — Lacak Dokumen Imigrasi Anda (Visa, KITAS, Paspor)" />
    <meta property="og:description" content="Lacak status dan riwayat dokumen imigrasi Anda secara real-time. Layanan pengurusan Visa, KITAS/KITAP, dan Paspor yang cepat, andal, dan transparan di Bali." />
    <meta property="og:url" content="https://gudangvisa-tracking-system.vercel.app/portal" />
    <meta property="og:image" content="https://gudangvisa-tracking-system.vercel.app/design/master-logo-2.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GudangVisa — Lacak Dokumen Imigrasi Anda (Visa, KITAS, Paspor)" />
    <meta name="twitter:description" content="Lacak status dan riwayat dokumen imigrasi Anda secara real-time. Layanan pengurusan Visa, KITAS/KITAP, dan Paspor di Bali." />
    <meta name="twitter:image" content="https://gudangvisa-tracking-system.vercel.app/design/master-logo-2.png" />

    <!-- Preconnect to API for faster first request -->
    <link rel="preconnect" href="https://gudangvisa-backend-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://gudangvisa-backend-production.up.railway.app" />

    <!-- Google Fonts — preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
